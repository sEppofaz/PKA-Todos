<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Todos">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>PKA Todos</title>
  <style>
    :root {
      --bg:#f5f5f7; --bg2:#fff; --text:#1c1c1e; --text2:#6e6e73;
      --accent:#7C3AED; --border:#e5e5ea;
      --hoch:#ef4444; --mittel:#f59e0b; --niedrig:#6e6e73;
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#1c1c1e; --bg2:#2c2c2e; --text:#f5f5f7; --text2:#8e8e93;
        --accent:#a78bfa; --border:#3a3a3c;
        --hoch:#f87171; --mittel:#fbbf24; --niedrig:#8e8e93;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100svh}

    /* Loading / Setup */
    #loading,#setup{padding:40px 20px;max-width:480px;margin:0 auto}
    #loading{text-align:center;color:var(--text2);padding-top:80px}
    #setup h2{font-size:1.15rem;font-weight:700;margin-bottom:8px}
    #setup p{color:var(--text2);font-size:.87rem;margin-bottom:20px}
    .setup-note{font-size:.75rem;color:var(--text2);margin-top:10px}
    .setup-note code{background:var(--border);padding:1px 4px;border-radius:4px;font-size:.72rem}

    /* Header */
    header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;padding-top:env(safe-area-inset-top,0px)}
    .h-row{display:flex;align-items:center;justify-content:space-between;padding:12px calc(16px + env(safe-area-inset-right,0px)) 10px calc(16px + env(safe-area-inset-left,0px))}
    header h1{font-size:1.15rem;font-weight:700}
    .btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.88rem;font-weight:600;cursor:pointer}


    /* Main */
    main{padding:12px calc(12px + env(safe-area-inset-right,0px)) calc(16px + env(safe-area-inset-bottom,0px)) calc(12px + env(safe-area-inset-left,0px));max-width:600px;margin:0 auto}

    /* Prio-Gruppe */
    .prio-label{display:flex;align-items:center;gap:6px;font-size:.73rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:10px 4px 4px}
    .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .ph{background:var(--hoch)} .pm{background:var(--mittel)} .pn{background:var(--niedrig)}

    /* Karte */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
    .card.done{opacity:.5}
    .chk{flex-shrink:0;width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,border-color .15s}
    .chk.on{background:var(--accent);border-color:var(--accent)}
    .chk.on::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
    .cbody{flex:1;min-width:0}
    .ctext{font-size:.9rem;line-height:1.4;word-break:break-word}
    .card.done .ctext{text-decoration:line-through}
    .cmeta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
    .cdate{font-size:.72rem;color:var(--text2)}
    .cnum{font-size:.72rem;font-weight:700;color:var(--text2);background:var(--border);border-radius:4px;padding:1px 5px;flex-shrink:0}
    .pbadge{font-size:.68rem;font-weight:600;border-radius:4px;padding:1px 5px}
    .bh{color:var(--hoch);background:color-mix(in srgb,var(--hoch) 15%,transparent)}
    .bm{color:var(--mittel);background:color-mix(in srgb,var(--mittel) 15%,transparent)}
    .bn{color:var(--niedrig);background:color-mix(in srgb,var(--niedrig) 15%,transparent)}
    .kbadge{font-size:.68rem;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px}
    .cacts{flex-shrink:0;display:flex;gap:2px}
    .bico{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;color:var(--text2);font-size:.95rem;line-height:1}
    .bico:hover{background:var(--border)}
    .drag-handle{cursor:grab;color:var(--text2);font-size:1rem;flex-shrink:0;padding:3px 4px;line-height:1;touch-action:none;user-select:none;-webkit-user-select:none;opacity:.45}
    .drag-handle:active{cursor:grabbing}
    .card.dragging{opacity:.35;background:var(--border)}

    /* Erledigt-Sektion */
    .done-sec{margin-top:10px}
    .done-tog{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;padding:6px 4px;width:100%}
    .darr{transition:transform .2s;display:inline-block}
    .darr.open{transform:rotate(90deg)}
    .done-list{display:none}
    .done-list.open{display:block}

    /* Empty */
    .empty{text-align:center;color:var(--text2);font-size:.9rem;padding:50px 20px}

    /* Forms */
    .form-row{margin-bottom:12px}
    .form-row label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:4px}
    .form-row textarea,.form-row input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem;font-family:inherit}
    .form-row textarea{resize:none;min-height:80px}
    .seg{display:flex;background:var(--bg);border-radius:8px;padding:2px;gap:2px}
    .seg-b{flex:1;padding:7px 4px;text-align:center;font-size:.8rem;font-weight:500;border:none;background:none;color:var(--text2);border-radius:6px;cursor:pointer;transition:background .15s,color .15s}
    .seg-b.on{background:var(--bg2);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .fbadge{font-size:.68rem;font-weight:600;border-radius:4px;padding:1px 5px}
    .fb-due{color:#ea580c;background:color-mix(in srgb,#ea580c 15%,transparent)}
    .fb-late{color:var(--hoch);background:color-mix(in srgb,var(--hoch) 15%,transparent)}
    .fb-future{color:var(--text2);background:var(--border)}
    input[type=date]{color-scheme:light dark}
    .mbtns{display:flex;gap:8px;margin-top:16px}
    .btn-sec{flex:1;padding:11px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text);font-size:.9rem;cursor:pointer}
    .btn-pri{flex:2;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}
    .btn-wide{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}

    /* Modal */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:var(--bg2);border-radius:16px;padding:20px 16px;width:100%;max-width:520px;max-height:90svh;overflow-y:auto}
    .modal h3{font-size:1rem;font-weight:700;margin-bottom:16px}
  </style>
</head>
<body>

<div id="loading">⏳ Laden…</div>

<div id="setup" style="display:none">
  <h2>Dropbox verbinden</h2>
  <p>Einmalig einrichten – danach automatisch.</p>
  <div class="form-row">
    <label>App-Key</label>
    <input type="text" id="s-key" value="s2ggv6zysmzn7fa">
  </div>
  <button class="btn-wide" onclick="doConnect()">Mit Dropbox verbinden →</button>
  <p class="setup-note">Redirect URI im Dropbox Developer Portal eintragen:<br>
    <code>https://seppofaz.github.io/PKA-Todos/</code></p>
</div>

<div id="app" style="display:none">
  <header>
    <div class="h-row">
      <h1>PKA Todos</h1>
      <button class="btn-add" onclick="showAdd()">+ Neu</button>
    </div>
  </header>
  <main id="list"></main>
</div>

<!-- Add / Edit Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="m-title">Neues Todo</h3>
    <div class="form-row">
      <label>Aufgabe</label>
      <textarea id="m-text" placeholder="Was ist zu tun?"></textarea>
    </div>
    <div class="form-row">
      <label>Priorität</label>
      <div class="seg" id="m-prio">
        <button class="seg-b" data-v="hoch"    onclick="setPrio('hoch')">🔴 Hoch</button>
        <button class="seg-b on" data-v="niedrig" onclick="setPrio('niedrig')">⚪ Niedrig</button>
        <button class="seg-b" data-v="mittel"  onclick="setPrio('mittel')">🟡 Mittel</button>
      </div>
    </div>
    <div class="form-row">
      <label>Fälligkeit <span style="font-weight:400;color:var(--text2)">(optional)</span></label>
      <div style="display:flex;gap:8px">
        <input type="date" id="m-faell" style="flex:1">
        <input type="time" id="m-faell-uhr" style="flex:0 0 auto;width:110px">
      </div>
    </div>
    <div class="mbtns">
      <button class="btn-sec" onclick="closeModal()">Abbrechen</button>
      <button class="btn-pri" onclick="saveModal()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── Konstanten ─────────────────────────────────────────────────
const APP_KEY      = 's2ggv6zysmzn7fa';
const DBX_FILE     = '/Apps/Claude/Todo-App/Todos.json';
const DBX_REDIRECT = 'https://seppofaz.github.io/PKA-Todos/';
const LS_REFRESH   = 'pka_todos_dbx_refresh';
const LS_KEY       = 'pka_todos_dbx_key';
const UP_URL       = 'https://content.dropboxapi.com/2/files/upload';
const DL_URL       = 'https://content.dropboxapi.com/2/files/download';
const PRIO_ORDER   = { hoch:0, mittel:1, niedrig:2 };
const PRIO_LBL     = { hoch:'Hoch', mittel:'Mittel', niedrig:'Niedrig' };
const KAT_LBL      = { pka:'PKA', privat:'Privat', arbeit:'Arbeit' };

// ── State ──────────────────────────────────────────────────────
let dbxAccess = '', dbxRefresh = '', dbxKey = APP_KEY;
let db = { v:1, todos:[] };
let tab = 'pka', editId = null, mPrio = 'niedrig', mKat = 'pka', mFaell = '', mFaellUhr = '';

try { dbxRefresh = localStorage.getItem(LS_REFRESH) || ''; } catch(e) {}
try { dbxKey = localStorage.getItem(LS_KEY) || APP_KEY; } catch(e) {}

// ── PKCE ───────────────────────────────────────────────────────
const rnd = n => { const a = new Uint8Array(n); crypto.getRandomValues(a); return a; };
const b64 = u => btoa(String.fromCharCode(...u)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const sha  = s => crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)).then(b => new Uint8Array(b));

async function startAuth() {
  const ver = b64(rnd(32)), ch = b64(await sha(ver));
  try { sessionStorage.setItem('pkav', ver); } catch(e) {}
  const p = new URLSearchParams({ response_type:'code', client_id:dbxKey, redirect_uri:DBX_REDIRECT,
    code_challenge:ch, code_challenge_method:'S256', token_access_type:'offline' });
  location.href = 'https://www.dropbox.com/oauth2/authorize?' + p;
}

async function handleCallback(code) {
  const ver = sessionStorage.getItem('pkav') || '';
  const r = await fetch('https://api.dropbox.com/oauth2/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ code, grant_type:'authorization_code', client_id:dbxKey, code_verifier:ver, redirect_uri:DBX_REDIRECT })
  });
  const d = await r.json();
  if (d.access_token) {
    dbxAccess = d.access_token; dbxRefresh = d.refresh_token || '';
    try { localStorage.setItem(LS_REFRESH, dbxRefresh); } catch(e) {}
    history.replaceState({}, '', DBX_REDIRECT);
    await load();
  }
}

async function refresh() {
  const r = await fetch('https://api.dropbox.com/oauth2/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ grant_type:'refresh_token', refresh_token:dbxRefresh, client_id:dbxKey })
  });
  const d = await r.json();
  if (d.access_token) { dbxAccess = d.access_token; return true; }
  dbxRefresh = '';
  try { localStorage.removeItem(LS_REFRESH); } catch(e) {}
  return false;
}

// ── Dropbox I/O ────────────────────────────────────────────────
async function dbxGet(path) {
  const r = await fetch(DL_URL, { headers:{ Authorization:'Bearer '+dbxAccess, 'Dropbox-API-Arg':JSON.stringify({path}) }});
  if (r.status === 401) { await refresh(); return dbxGet(path); }
  return r.ok ? r : null;
}

async function dbxPut(path, data) {
  const body = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  const r = await fetch(UP_URL, {
    method:'POST',
    headers:{ Authorization:'Bearer '+dbxAccess, 'Content-Type':'application/octet-stream',
              'Dropbox-API-Arg':JSON.stringify({path, mode:'overwrite', autorename:false}) },
    body
  });
  if (r.status === 401) { await refresh(); return dbxPut(path, data); }
}

// ── Load / Save ────────────────────────────────────────────────
async function load() {
  show('loading'); hide('app');
  const r = await dbxGet(DBX_FILE);
  if (r) {
    try { db = await r.json(); } catch(e) { db = {v:1,todos:[]}; }
  }
  hide('loading'); show('app');
  render();
}

async function save() { await dbxPut(DBX_FILE, db); }

// ── Render ─────────────────────────────────────────────────────
function render() {
  const filtered = db.todos.filter(t => t.kategorie === tab);
  const offen = filtered.filter(t => !t.erledigt).sort((a,b) => PRIO_ORDER[a.prio]-PRIO_ORDER[b.prio] || b.datum.localeCompare(a.datum));
  const done  = filtered.filter(t => t.erledigt).sort((a,b) => (b.erledigt_am||'').localeCompare(a.erledigt_am||''));

  if (!offen.length && !done.length) {
    document.getElementById('list').innerHTML = '<div class="empty">Keine Todos.<br>+ Neu zum Hinzufügen.</div>';
    return;
  }

  const g = {hoch:[],mittel:[],niedrig:[]};
  offen.forEach(t => g[t.prio||'niedrig'].push(t));
  for (const p of ['hoch','mittel','niedrig']) {
    g[p].sort((a,b) => {
      const ao = a.order??9999, bo = b.order??9999;
      return ao !== bo ? ao-bo : b.datum.localeCompare(a.datum);
    });
  }

  let h = '';
  for (const p of ['hoch','mittel','niedrig']) {
    if (!g[p].length) continue;
    const dot = p==='hoch'?'ph':p==='mittel'?'pm':'pn';
    h += `<div class="prio-label" data-prio="${p}"><span class="pdot ${dot}"></span>${PRIO_LBL[p]}</div>`;
    g[p].forEach(t => { h += card(t); });
  }
  if (done.length) {
    h += `<div class="done-sec"><button class="done-tog" onclick="togDone(this)"><span class="darr">▶</span> Erledigt (${done.length})</button><div class="done-list">${done.map(card).join('')}</div></div>`;
  }
  document.getElementById('list').innerHTML = h;
  initDrag();
}

function faellBadge(f, fu, erledigt) {
  if (!f || erledigt) return '';
  const today = new Date().toISOString().split('T')[0];
  const df = f.split('-').reverse().join('.');
  const uhr = fu ? ` ${fu}` : '';
  if (f < today)  return `<span class="fbadge fb-late">⚠️ ${df}${uhr}</span>`;
  if (f === today) return `<span class="fbadge fb-due">📅 Heute${uhr}</span>`;
  return `<span class="fbadge fb-future">📅 ${df}${uhr}</span>`;
}

function card(t) {
  const d = t.datum ? t.datum.split('-').reverse().join('.') : '';
  const pb = t.prio==='hoch'?'bh':t.prio==='mittel'?'bm':'bn';
  const kb = tab==='alle' ? `<span class="kbadge">${KAT_LBL[t.kategorie]||t.kategorie}</span>` : '';
  const fb = faellBadge(t.faelligkeit, t.faelligkeit_uhrzeit, t.erledigt);
  const nr = t.nr != null ? `<span class="cnum">#${t.nr}</span>` : '';
  return `<div class="card${t.erledigt?' done':''}" data-id="${t.id}" data-prio="${t.prio||'niedrig'}" onclick="showEdit('${t.id}')">
    <div class="drag-handle" onclick="event.stopPropagation()">⠿</div>
    <div class="chk${t.erledigt?' on':''}" onclick="event.stopPropagation();toggle('${t.id}')"></div>
    <div class="cbody">
      <div class="ctext">${esc(t.aufgabe)}</div>
      <div class="cmeta">${nr}<span class="cdate">${d}</span><span class="pbadge ${pb}">${PRIO_LBL[t.prio||'niedrig']}</span>${kb}${fb}</div>
    </div>
    <div class="cacts">
      <button class="bico" onclick="event.stopPropagation();del('${t.id}')" title="Löschen">🗑</button>
    </div>
  </div>`;
}

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const show = id => document.getElementById(id).style.display = '';
const hide = id => document.getElementById(id).style.display = 'none';

function togDone(btn) {
  btn.querySelector('.darr').classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ── Aktionen ───────────────────────────────────────────────────
async function toggle(id) {
  const t = db.todos.find(x => x.id === id); if (!t) return;
  t.erledigt = !t.erledigt;
  t.erledigt_am = t.erledigt ? new Date().toISOString().split('T')[0] : null;
  render(); save();
}

async function del(id) {
  if (!confirm('Todo löschen?')) return;
  db.todos = db.todos.filter(t => t.id !== id);
  render(); save();
}

// ── Modal ──────────────────────────────────────────────────────
function showAdd() {
  editId = null;
  document.getElementById('m-title').textContent = 'Neues Todo';
  document.getElementById('m-text').value = '';
  document.getElementById('m-faell').value = '';
  mPrio = 'niedrig'; mKat = tab === 'alle' ? 'pka' : tab; mFaell = '';
  seg('m-prio', mPrio); seg('m-kat', mKat);
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-text').focus(), 100);
}

function showEdit(id) {
  const t = db.todos.find(x => x.id === id); if (!t) return;
  editId = id;
  document.getElementById('m-title').textContent = 'Todo bearbeiten';
  document.getElementById('m-text').value = t.aufgabe;
  document.getElementById('m-faell').value = t.faelligkeit || '';
  document.getElementById('m-faell-uhr').value = t.faelligkeit_uhrzeit || '';
  mPrio = t.prio || 'niedrig'; mKat = t.kategorie || 'pka'; mFaell = t.faelligkeit || ''; mFaellUhr = t.faelligkeit_uhrzeit || '';
  seg('m-prio', mPrio); seg('m-kat', mKat);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function setPrio(v) { mPrio = v; seg('m-prio', v); }
function setKat(v)  { mKat  = v; seg('m-kat',  v); }
function seg(id, v) { document.querySelectorAll(`#${id} .seg-b`).forEach(b => b.classList.toggle('on', b.dataset.v === v)); }

async function saveModal() {
  const aufgabe = document.getElementById('m-text').value.trim();
  if (!aufgabe) { document.getElementById('m-text').style.borderColor = 'var(--hoch)'; return; }
  document.getElementById('m-text').style.borderColor = '';
  const faelligkeit = document.getElementById('m-faell').value || null;
  const faelligkeit_uhrzeit = faelligkeit ? (document.getElementById('m-faell-uhr').value || null) : null;
  if (editId) {
    const t = db.todos.find(x => x.id === editId);
    if (t) { t.aufgabe = aufgabe; t.prio = mPrio; t.kategorie = mKat; t.faelligkeit = faelligkeit; t.faelligkeit_uhrzeit = faelligkeit_uhrzeit; }
  } else {
    const nextNr = Math.max(0, ...db.todos.map(t => t.nr || 0)) + 1;
    db.todos.push({ id:crypto.randomUUID(), datum:new Date().toISOString().split('T')[0],
      aufgabe, prio:mPrio, kategorie:'pka', erledigt:false, erledigt_am:null, faelligkeit, faelligkeit_uhrzeit, nr:nextNr });
  }
  closeModal(); render(); await save();
}

// ── Drag & Drop ────────────────────────────────────────────────
let _drag = null;

function initDrag() {
  document.querySelectorAll('.drag-handle').forEach(h => {
    h.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      const card = h.closest('.card');
      _drag = { card, prio: card.dataset.prio };
      card.classList.add('dragging');
      card.style.pointerEvents = 'none';
      document.addEventListener('pointermove', onDragMove, { passive: false });
      document.addEventListener('pointerup', onDragEnd);
    });
  });
}

function onDragMove(e) {
  e.preventDefault();
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (!el) return;
  const target = el.closest('.card[data-id]');
  if (!target || target === _drag.card || target.dataset.prio !== _drag.prio) return;
  const rect = target.getBoundingClientRect();
  if (e.clientY < rect.top + rect.height / 2) {
    target.parentNode.insertBefore(_drag.card, target);
  } else {
    target.parentNode.insertBefore(_drag.card, target.nextSibling);
  }
}

function onDragEnd() {
  if (!_drag) return;
  _drag.card.classList.remove('dragging');
  _drag.card.style.pointerEvents = '';
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  saveOrder();
  _drag = null;
}

function saveOrder() {
  document.querySelectorAll('.card[data-id]').forEach((c, i) => {
    const t = db.todos.find(x => x.id === c.dataset.id);
    if (t) t.order = i;
  });
  save();
}

// ── Setup ──────────────────────────────────────────────────────
function doConnect() {
  const k = document.getElementById('s-key').value.trim();
  if (k) { dbxKey = k; try { localStorage.setItem(LS_KEY, k); } catch(e) {} }
  startAuth();
}

// ── Entry ──────────────────────────────────────────────────────
async function init() {
  const code = new URLSearchParams(location.search).get('code');
  if (code) { await handleCallback(code); return; }
  if (!dbxRefresh) { hide('loading'); show('setup'); return; }
  const ok = await refresh();
  if (!ok) { hide('loading'); show('setup'); return; }
  await load();
}

init();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && dbxRefresh) load();
});
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
          w.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(e => console.warn('[sw]', e));
}
</script>
</body>
</html>
